services:
  db:
    image: mysql:8.4
    container_name: ${DB_CONTAINER_NAME:-db}
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - type: bind
        source: ${DB_MOUNT_PATH:-./db}
        target: /var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    networks:
      - nextcloud_net

  redis:
    image: redis:alpine
    container_name: ${REDIS_CONTAINER_NAME:-redis}
    restart: always
    volumes:
      - type: bind
        source: ${REDIS_MOUNT_PATH:-./redis}
        target: /data
    networks:
      - nextcloud_net

  app:
    image: nextcloud:27.1.2-apache
    container_name: ${NEXTCLOUD_APP_CONTAINER_NAME:-nextcloud-app}
    restart: always
    ports:
      - "${NEXTCLOUD_PORT}:80"
    depends_on:
      - redis
      - db
    volumes:
      - type: bind
        source: ${NEXTCLOUD_CONFIG_MOUNT_PATH:-./config}
        target: /var/www/html/config
      - type: bind
        source: ${NEXTCLOUD_APPS_EXTERNAL_MOUNT_PATH:-./apps-external}
        target: /var/www/html/custom_apps
      - type: bind
        source: ${NEXTCLOUD_DATA_MOUNT_PATH:-./data}
        target: ${NEXTCLOUD_FILES_CONTAINER_PATH:-/var/www/html/data}
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
    networks:
      - nextcloud_net

  cron:
    image: nextcloud:27.1.2-apache
    container_name: ${NEXTCLOUD_CRON_CONTAINER_NAME:-nextcloud-cron}
    restart: always
    depends_on:
      - app
    volumes:
      - type: bind
        source: ${NEXTCLOUD_CONFIG_MOUNT_PATH:-./config}
        target: /var/www/html/config
      - type: bind
        source: ${NEXTCLOUD_APPS_EXTERNAL_MOUNT_PATH:-./apps-external}
        target: /var/www/html/custom_apps
      - type: bind
        source: ${NEXTCLOUD_DATA_MOUNT_PATH:-./data}
        target: ${NEXTCLOUD_FILES_CONTAINER_PATH:-/var/www/html/data}
    entrypoint: /cron.sh
    networks:
      - nextcloud_net

networks:
  nextcloud_net:
    driver: bridge
